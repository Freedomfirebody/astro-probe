name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Cargo Test
        run: cargo test --workspace

      - name: Setup Node.js (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node.js Dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd visualizers
          npm install

      - name: Build Visualizer Components (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd visualizers
          npm run build

      - name: Run E2E Tests (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd visualizers/e2e-tests
          npm test

  build-release:
    name: Build Release Binaries
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: astro-probe-server-linux-amd64
            asset_name: astro-probe-server-linux-amd64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: astro-probe-server-windows-amd64
            asset_name: astro-probe-server-windows-amd64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: astro-probe-server-macos-amd64
            asset_name: astro-probe-server-macos-amd64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: astro-probe-server-macos-arm64
            asset_name: astro-probe-server-macos-arm64.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ matrix.target }}-

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path astro-probe-server.exe -DestinationPath ../../../${{ matrix.asset_name }}

      - name: Package Binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.asset_name }} astro-probe-server

      - name: Install WASM Target (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: rustup target add wasm32-wasi || rustup target add wasm32-wasip1

      - name: Setup Node.js (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build and Package Visualizer & Zed Extension (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # 1. Install dependencies and build visualizer components
          cd visualizers
          npm install
          npm run build
          
          # 2. Package visualizer middle/front tier
          tar -czf ../astro-probe-visualizer.tar.gz package.json server/package.json server/src frontend/dist
          
          # 3. Build Zed Extension WASM
          cd zed-extension
          cargo build --release --target wasm32-wasi || cargo build --release --target wasm32-wasip1
          
          # 4. Assemble and Package Zed Extension
          cd ../..
          mkdir zed-extension-package
          cp visualizers/zed-extension/extension.toml zed-extension-package/
          if [ -f visualizers/zed-extension/target/wasm32-wasi/release/astro_probe_zed.wasm ]; then
            cp visualizers/zed-extension/target/wasm32-wasi/release/astro_probe_zed.wasm zed-extension-package/extension.wasm
          else
            cp visualizers/zed-extension/target/wasm32-wasip1/release/astro_probe_zed.wasm zed-extension-package/extension.wasm
          fi
          cp visualizers/zed-extension/dist/lsp-adapter.js zed-extension-package/lsp-adapter.js
          cp -r visualizers/zed-extension/keymaps zed-extension-package/keymaps
          tar -czf astro-probe-zed-extension.tar.gz -C zed-extension-package extension.toml extension.wasm lsp-adapter.js keymaps

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Visualizer & Zed Extension Assets (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            astro-probe-visualizer.tar.gz
            astro-probe-zed-extension.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
